<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number System Converter - Fractions, Decimals, and Whole Numbers</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #1a0a0a, #2c1810, #1a0a0a);
            font-family: 'Comic Sans MS', 'Trebuchet MS', 'Arial', sans-serif;
            animation: fadeIn 0.8s ease-in-out;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(-30px);
            }
        }

        /* Floating Home Icon */
        .home-icon {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 40px;
            color: #d4a574;
            text-decoration: none;
            padding: 15px;
            border-radius: 50%;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #2c1810, #1a0f0a);
            border: 3px solid rgba(139, 69, 19, 0.6);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
        }

        .home-icon:hover {
            background: linear-gradient(135deg, #3a2010, #2c1810);
            transform: scale(1.15) rotate(5deg);
            color: #ffcc80;
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.4);
        }

        h1 {
            text-align: center;
            color: #d4a574;
            font-family: 'Comic Sans MS', 'Trebuchet MS', 'Arial', sans-serif;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(212, 165, 116, 0.3);
            margin: 30px 0 10px 0;
            font-size: 2.5em;
        }

        #sketch-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            position: relative;
        }

        .instructions {
            max-width: 1200px;
            margin: 20px auto;
            padding: 25px;
            background: linear-gradient(135deg, rgba(44, 24, 16, 0.8), rgba(26, 15, 10, 0.8));
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(139, 69, 19, 0.6);
            font-family: 'Comic Sans MS', 'Trebuchet MS', 'Arial', sans-serif;
            color: #c9b699;
        }

        .instructions h3 {
            color: #d4a574;
            margin-bottom: 15px;
            font-size: 1.4em;
            text-shadow: 0 0 8px rgba(212, 165, 116, 0.3);
        }

        .instructions ul {
            list-style: none;
            padding-left: 0;
        }

        .instructions li {
            padding: 10px 0;
            font-size: 1.1em;
            border-bottom: 1px solid rgba(139, 69, 19, 0.3);
        }

        .instructions li:last-child {
            border-bottom: none;
        }

        .instructions strong {
            color: #ffcc80;
        }

        /* Particle effects */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 30px;
            animation: float-up 2s ease-out forwards;
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) scale(1.5) rotate(720deg);
            }
        }

        /* Celebration overlay */
        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
        }
    </style>
</head>
<body>
    <!-- Floating Home Icon -->
    <a href="math-fire-animation.html" class="home-icon" title="Back to Home">🏠</a>

    <h1>Number System Converter</h1>
    <div class="instructions">
        <h3>How to Use:</h3>
        <p style="text-align: center; font-size: 1.1em; margin: 0;">
            <strong>Click buttons</strong> to navigate • <strong>Press 'C'</strong> for steps • <strong>Spacebar</strong> for next • <strong>'R'</strong> to reset
        </p>
    </div>
    <div id="sketch-container">
        <!-- p5.js sketch will be inserted here -->
    </div>

    <script src="number-system.js"></script>
    <script>
        // Add smooth page transition for home icon
        document.querySelector('.home-icon').addEventListener('click', function(e) {
            e.preventDefault();
            const href = this.getAttribute('href');

            // Add fade-out animation
            document.body.style.animation = 'fadeOut 0.5s ease-in-out';

            // Navigate after animation
            setTimeout(() => {
                window.location.href = href;
            }, 500);
        });
    </script>
</body>
</html>
